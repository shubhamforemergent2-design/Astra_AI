name: Build and Notify Preview

on:
  push:
    branches: [ main ]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci || yarn install

      - name: Build frontend
        working-directory: ./frontend
        run: |
          # Prefer yarn if present
          if [ -f yarn.lock ]; then yarn build; else npm run build; fi

      - name: Prepare notify payload
        id: payload
        run: |
          echo "{\"repository\": \"${{ github.repository }}\", \"ref\": \"${{ github.ref }}\", \"sha\": \"${{ github.sha }}\"}" > payload.json

      - name: Notify Preview Webhook
        if: ${{ secrets.PREVIEW_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.PREVIEW_WEBHOOK_URL }}
          PREVIEW_TOKEN: ${{ secrets.PREVIEW_TOKEN }}
        run: |
          echo "Notifying preview at $WEBHOOK_URL"
          if [ -n "$PREVIEW_TOKEN" ]; then
            curl -sS -X POST -H "Content-Type: application/json" -H "Authorization: Bearer $PREVIEW_TOKEN" -d @payload.json "$WEBHOOK_URL"
          else
            curl -sS -X POST -H "Content-Type: application/json" -d @payload.json "$WEBHOOK_URL"
          fi

      - name: Optional: Deploy via SSH
        if: ${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_HOST != '' }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_RESTART_CMD: ${{ secrets.DEPLOY_RESTART_CMD }}
        run: |
          echo "Preparing SSH key"
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts || true

          echo "Syncing build to $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
          # Ensure variables have sensible defaults
          USER=${DEPLOY_USER:-root}
          PATH_ON_HOST=${DEPLOY_PATH:-/var/www/html}

          rsync -avz --delete frontend/build/ "$USER@$DEPLOY_HOST:$PATH_ON_HOST/"

          if [ -n "$DEPLOY_RESTART_CMD" ]; then
            echo "Running remote restart command"
            ssh "$USER@$DEPLOY_HOST" "$DEPLOY_RESTART_CMD"
          fi

      - name: Upload build artifact (optional)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
